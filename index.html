<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalorien">
<title>Kalorien &middot; Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0c101a;
    --bg-2: #111726;
    --glass: rgba(255, 255, 255, 0.045);
    --glass-strong: rgba(255, 255, 255, 0.07);
    --border: rgba(255, 255, 255, 0.09);
    --border-soft: rgba(255, 255, 255, 0.06);
    --text: #eef1f7;
    --text-dim: #8b93a7;
    --text-faint: #5b6275;
    --rose: #e6b7a0;
    --rose-strong: #d99c78;
    --rose-glow: rgba(230, 183, 160, 0.28);
    --emerald: #45d6a4;
    --emerald-glow: rgba(69, 214, 164, 0.22);
    --aqua: #62cbe8;
    --aqua-strong: #3aa7d8;
    --aqua-glow: rgba(98, 203, 232, 0.25);
    --danger: #e77c7c;
    --radius: 22px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
    background: var(--bg-0);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Inter, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1000px 600px at 85% -10%, rgba(230, 183, 160, 0.09), transparent 60%),
      radial-gradient(900px 700px at -15% 25%, rgba(45, 90, 140, 0.16), transparent 60%),
      radial-gradient(700px 500px at 50% 110%, rgba(69, 214, 164, 0.07), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0) 55%);
    background-attachment: fixed;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 22px 18px calc(104px + var(--safe-b));
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 6px 4px 20px;
  }
  header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(100deg, var(--text) 30%, var(--rose) 90%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header .date {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* ---------- Cards / Glass ---------- */
  .card {
    background: linear-gradient(165deg, var(--glass-strong), var(--glass) 60%);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 12px 34px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* ---------- Hero (Tagesbilanz) ---------- */
  .hero { text-align: center; padding: 28px 20px 24px; }
  .hero .kcal-now {
    font-size: 58px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(120deg, #f6e7dc, var(--rose) 70%, var(--rose-strong));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 4px 24px var(--rose-glow));
  }
  .hero .kcal-goal {
    margin-top: 8px;
    font-size: 15px;
    color: var(--text-dim);
    font-weight: 500;
    cursor: pointer;
  }
  .hero .kcal-goal .edit-hint { font-size: 11px; opacity: 0.65; margin-left: 4px; }
  .hero .remaining {
    margin-top: 4px;
    font-size: 13px;
    color: var(--text-faint);
    font-weight: 500;
  }
  .hero .remaining b { color: var(--emerald); font-weight: 600; }
  .hero .remaining b.over { color: var(--danger); }

  .progress-track {
    margin-top: 22px;
    height: 12px;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border-soft);
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--emerald), var(--rose) 85%);
    box-shadow: 0 0 18px var(--emerald-glow), 0 0 10px var(--rose-glow);
    transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1), background 0.4s;
    position: relative;
    overflow: hidden;
  }
  .progress-fill.over { background: linear-gradient(90deg, var(--rose-strong), var(--danger)); }
  .progress-fill.aqua {
    background: linear-gradient(90deg, #2f86c9, var(--aqua) 85%);
    box-shadow: 0 0 18px var(--aqua-glow);
  }
  .progress-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-100%);
    animation: shimmer 3.2s ease-in-out infinite;
  }
  @keyframes shimmer { 60%, 100% { transform: translateX(100%); } }

  /* ---------- Inputs & Buttons ---------- */
  .field-row { display: flex; gap: 10px; margin-bottom: 12px; }
  input[type="text"], input[type="number"], input[type="date"] {
    width: 100%;
    background: rgba(0, 0, 0, 0.28);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    user-select: text;
    -webkit-user-select: text;
  }
  input::placeholder { color: var(--text-faint); }
  input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px var(--rose-glow);
  }
  input[type="number"] { max-width: 116px; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 650;
    font-family: inherit;
    color: #1c110a;
    background: linear-gradient(120deg, #f0cfb8, var(--rose) 55%, var(--rose-strong));
    box-shadow: 0 6px 20px var(--rose-glow), inset 0 1px 0 rgba(255,255,255,0.4);
    cursor: pointer;
    transition: transform 0.12s ease, filter 0.2s;
  }
  .btn:active { transform: scale(0.96); filter: brightness(1.08); }

  .icon-btn {
    background: var(--glass-strong);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 12px;
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    cursor: pointer;
    transition: transform 0.12s ease, color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.danger:active { color: var(--danger); border-color: var(--danger); }
  .icon-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* ---------- Wassertracker ---------- */
  .water-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .water-now {
    font-size: 30px;
    font-weight: 750;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(120deg, #d8f2fb, var(--aqua) 70%, var(--aqua-strong));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 3px 16px var(--aqua-glow));
  }
  .water-goal {
    font-size: 13.5px;
    color: var(--text-dim);
    font-weight: 500;
    cursor: pointer;
  }
  .water-goal .edit-hint { font-size: 11px; opacity: 0.65; margin-left: 3px; }
  .water-track { margin-top: 12px; height: 10px; }
  .water-btns { display: flex; gap: 10px; margin-top: 16px; }
  .water-btn {
    flex: 1;
    border: 1px solid rgba(98, 203, 232, 0.28);
    background: rgba(98, 203, 232, 0.07);
    color: var(--aqua);
    font-family: inherit;
    font-size: 14px;
    font-weight: 650;
    padding: 12px 0;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.2s, border-color 0.2s;
  }
  .water-btn:active { transform: scale(0.95); background: rgba(98, 203, 232, 0.16); border-color: var(--aqua); }
  .water-btn.minus {
    flex: 0 0 56px;
    color: var(--text-dim);
    border-color: var(--border);
    background: var(--glass-strong);
    font-size: 18px;
  }
  .water-btn.minus:active { color: var(--danger); border-color: var(--danger); background: rgba(231, 124, 124, 0.08); }

  /* ---------- Favoriten ---------- */
  .fav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .fav {
    text-align: left;
    background: rgba(255, 255, 255, 0.035);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 13px 14px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    transition: transform 0.12s ease, border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .fav:active { transform: scale(0.96); border-color: var(--rose); background: rgba(230,183,160,0.08); }
  .fav .f-name { font-size: 13.5px; font-weight: 600; display: block; margin-bottom: 4px; line-height: 1.25; }
  .fav .f-kcal { font-size: 12px; color: var(--rose); font-weight: 600; font-variant-numeric: tabular-nums; }
  .fav .f-name { padding-right: 22px; }
  .f-del {
    position: absolute; top: 4px; right: 4px;
    width: 28px; height: 28px;
    border: none; background: transparent;
    color: var(--text-faint); font-size: 12px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s ease, color 0.2s, background 0.2s;
  }
  .f-del:active { transform: scale(0.85); color: var(--danger); background: rgba(231, 124, 124, 0.12); }

  .add-row { display: flex; gap: 10px; }
  .add-row .btn { flex: 1; }
  .icon-btn.star {
    width: 49px; height: 49px;
    border-radius: 14px;
    font-size: 21px;
    color: var(--rose);
  }
  .icon-btn.star:active { border-color: var(--rose); background: rgba(230, 183, 160, 0.1); }

  /* ---------- Mahlzeiten-Liste ---------- */
  .meal-list { list-style: none; }
  .cat-block {
    list-style: none;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 4px 12px 6px;
    margin-bottom: 10px;
  }
  .cat-block:last-of-type { margin-bottom: 0; }
  .cat-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 2px 4px;
    font-size: 10.5px;
    font-weight: 650;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-faint);
  }
  .cat-head .cat-sum {
    letter-spacing: 0;
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .m-qty { color: var(--rose); font-size: 12.5px; font-weight: 650; }
  .meal {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 2px;
    border-bottom: 1px solid var(--border-soft);
    animation: rise 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .meal:last-child { border-bottom: none; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } }
  .meal .m-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: linear-gradient(120deg, var(--emerald), var(--rose));
    box-shadow: 0 0 8px var(--emerald-glow);
    flex-shrink: 0;
  }
  .meal .m-info { flex: 1 1 auto; min-width: 0; margin-right: 4px; }
  .meal .m-name {
    display: block;
    font-size: 14.5px;
    font-weight: 550;
    line-height: 1.3;
    white-space: normal;        /* Text darf flexibel umbrechen */
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .meal .m-time { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
  .meal .m-kcal {
    flex: 0 0 auto;             /* wird niemals gestaucht oder überlappt */
    font-size: 14px;
    font-weight: 650;
    color: var(--rose);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    text-align: right;
  }
  .m-qty { white-space: nowrap; }
  .empty {
    text-align: center; color: var(--text-faint);
    font-size: 13.5px; padding: 22px 0 14px;
  }

  .day-total {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 14px; font-weight: 600;
  }
  .day-total .sum { color: var(--rose); font-size: 17px; font-variant-numeric: tabular-nums; }

  /* ---------- Historie ---------- */
  .date-nav {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 16px;
  }
  .date-nav .current {
    flex: 1; text-align: center;
  }
  .date-nav .current .weekday { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .date-nav .current .datestr { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .date-picker-row { display: flex; justify-content: center; margin-bottom: 4px; }
  input[type="date"] {
    max-width: 210px; text-align: center;
    color-scheme: dark;
    font-size: 14px; padding: 10px 12px;
  }

  /* ---------- Statistik ---------- */
  .segmented {
    display: flex;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 18px;
  }
  .segmented button {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    padding: 9px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.25s, color 0.25s;
  }
  .segmented button:active { transform: scale(0.95); }
  .segmented button.active {
    background: linear-gradient(120deg, rgba(230,183,160,0.22), rgba(230,183,160,0.12));
    color: var(--rose);
    box-shadow: inset 0 0 0 1px rgba(230,183,160,0.35);
  }
  .chart-wrap { position: relative; height: 240px; }
  .chart-caption { text-align: center; font-size: 12px; color: var(--text-faint); margin-top: 12px; }

  /* ---------- Bottom Navigation ---------- */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    padding: 10px 18px calc(12px + var(--safe-b));
    background: linear-gradient(180deg, transparent, rgba(7, 9, 15, 0.85) 40%);
    pointer-events: none;
    z-index: 50;
  }
  .nav-inner {
    pointer-events: auto;
    display: flex;
    gap: 6px;
    background: rgba(18, 23, 36, 0.72);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.5);
  }
  .nav-inner button {
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 15px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: transform 0.12s ease, background 0.25s, color 0.25s;
  }
  .nav-inner button:active { transform: scale(0.94); }
  .nav-inner button .ico { font-size: 17px; line-height: 1; }
  .nav-inner button.active {
    color: var(--rose);
    background: rgba(230, 183, 160, 0.1);
  }

  /* ---------- Views ---------- */
  .view { display: none; animation: fade 0.3s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed;
    left: 50%;
    bottom: calc(96px + var(--safe-b));
    transform: translateX(-50%) translateY(16px);
    background: rgba(20, 26, 40, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 20px;
    font-size: 13.5px;
    font-weight: 550;
    color: var(--text);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast .t-accent { color: var(--emerald); }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Kalorien</h1>
    <span class="date" id="header-date"></span>
  </header>

  <!-- ================= DASHBOARD ================= -->
  <section class="view active" id="view-dashboard">

    <div class="card hero">
      <div class="kcal-now" id="kcal-now">0</div>
      <div class="kcal-goal" id="goal-label" title="Tagesziel ändern">
        / 2.500 kcal <span class="edit-hint">&#9998;</span>
      </div>
      <div class="remaining" id="remaining"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="card">
      <h2>Wasser</h2>
      <div class="water-head">
        <span class="water-now" id="water-now">0</span>
        <span class="water-goal" id="water-goal-label" title="Wasserziel ändern">/ 2,5 Liter <span class="edit-hint">&#9998;</span></span>
      </div>
      <div class="progress-track water-track">
        <div class="progress-fill aqua" id="water-fill"></div>
      </div>
      <div class="water-btns" id="water-btns">
        <button class="water-btn" data-water="250">+ 250 ml</button>
        <button class="water-btn" data-water="500">+ 500 ml</button>
        <button class="water-btn minus" data-water="-250" aria-label="250 ml abziehen" title="250 ml abziehen">&minus;</button>
      </div>
    </div>

    <div class="card">
      <h2>Mahlzeit hinzufügen</h2>
      <div class="field-row">
        <input type="text" id="inp-name" placeholder="Lebensmittel" autocomplete="off" enterkeyhint="next">
        <input type="number" id="inp-kcal" placeholder="kcal" min="1" inputmode="numeric" enterkeyhint="done">
      </div>
      <div class="add-row">
        <button class="btn" id="btn-add">Hinzufügen</button>
        <button class="icon-btn star" id="btn-fav-save" aria-label="Als Favorit speichern" title="Als Favorit speichern">&#9734;</button>
      </div>
    </div>

    <div class="card">
      <h2>Favoriten</h2>
      <div class="fav-grid" id="fav-grid"></div>
    </div>

    <div class="card">
      <h2>Heute gegessen</h2>
      <ul class="meal-list" id="today-list"></ul>
      <div class="day-total">
        <span>Gesamt</span>
        <span class="sum" id="today-sum">0 kcal</span>
      </div>
    </div>

  </section>

  <!-- ================= HISTORIE ================= -->
  <section class="view" id="view-history">

    <div class="card">
      <h2>Tag auswählen</h2>
      <div class="date-nav">
        <button class="icon-btn" id="hist-prev" aria-label="Vorheriger Tag">&#10094;</button>
        <div class="current">
          <div class="weekday" id="hist-weekday"></div>
          <div class="datestr" id="hist-datestr"></div>
        </div>
        <button class="icon-btn" id="hist-next" aria-label="Nächster Tag">&#10095;</button>
      </div>
      <div class="date-picker-row">
        <input type="date" id="hist-picker">
      </div>
    </div>

    <div class="card">
      <h2 id="hist-list-title">Mahlzeiten</h2>
      <ul class="meal-list" id="hist-list"></ul>
      <div class="day-total">
        <span>Endsumme</span>
        <span class="sum" id="hist-sum">0 kcal</span>
      </div>
    </div>

  </section>

  <!-- ================= STATISTIK ================= -->
  <section class="view" id="view-stats">

    <div class="card">
      <h2>Verlauf</h2>
      <div class="segmented" id="chart-seg">
        <button data-range="week" class="active">Woche</button>
        <button data-range="month">Monat</button>
        <button data-range="year">Jahr</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <div class="chart-caption" id="chart-caption"></div>
    </div>

    <div class="card">
      <h2>Wasser</h2>
      <div class="chart-wrap">
        <canvas id="water-chart"></canvas>
      </div>
      <div class="chart-caption" id="water-chart-caption"></div>
    </div>

  </section>

</div>

<nav>
  <div class="nav-inner">
    <button data-view="dashboard" class="active"><span class="ico">&#9679;</span>Heute</button>
    <button data-view="history"><span class="ico">&#9776;</span>Historie</button>
    <button data-view="stats"><span class="ico">&#10148;</span>Statistik</button>
  </div>
</nav>

<div id="toast"></div>

<script>
(() => {
  'use strict';

  /* ================= Konstanten & Helfer ================= */

  const STORAGE_KEY = 'kalorien-tracker-v1';
  const fmt = new Intl.NumberFormat('de-DE');
  const WEEKDAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const WEEKDAYS_SHORT = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const MONTHS_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

  const $ = (sel) => document.querySelector(sel);
  const pad = (n) => String(n).padStart(2, '0');
  const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  // Uhrzeit immer explizit auf 12:00 Uhr setzen, um Zeitzonen-/DST-Sprünge abzufangen
  const keyToDate = (k) => { const [y, m, d] = k.split('-').map(Number); return new Date(y, m - 1, d, 12, 0, 0); };
  const noonDate = (y, m, d) => new Date(y, m, d, 12, 0, 0);
  const todayKey = () => dateKey(new Date());
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  const haptic = (ms = 12) => { if (navigator.vibrate) { try { navigator.vibrate(ms); } catch (e) {} } };

  /* ---------- Mahlzeiten-Kategorien ---------- */
  const CATS = [
    { id: 'breakfast', label: 'Frühstück' },
    { id: 'lunch',     label: 'Mittagessen' },
    { id: 'dinner',    label: 'Abendessen' },
    { id: 'snack',     label: 'Snacks' }
  ];
  // 5–11 Uhr = Frühstück, 11–15 = Mittagessen, 17–22 = Abendessen, sonst Snacks
  const catForHour = (h) => (h >= 5 && h < 11) ? 'breakfast' : (h >= 11 && h < 15) ? 'lunch' : (h >= 17 && h < 22) ? 'dinner' : 'snack';
  // Namens-Sicherheitsnetz: Diese Wörter im Gerichtsnamen schlagen die Uhrzeit.
  // "Frühstück"/"Magerquark" -> fix Frühstück; "Apfel"/"Äpfel"/"Shake"/"Protein"/"Riegel" -> fix Snack.
  // Alles andere (z. B. "Vollkornbrot mit Ei", "Hähnchen mit Reis") -> flexibel nach Uhrzeit.
  const CAT_KEYWORDS = [
    ['breakfast', ['frühstück', 'magerquark']],
    ['snack',     ['apfel', 'äpfel', 'shake', 'protein', 'riegel']]
  ];
  function catForName(name) {
    const n = name.toLowerCase();
    for (const [cat, words] of CAT_KEYWORDS) {
      if (words.some((w) => n.includes(w))) return cat;
    }
    return null;
  }
  // Kategorie eines Eintrags – mit Fallback für Alt-Daten ohne cat-Feld
  const catOf = (e) => e.cat || (e.time ? catForHour(Number(e.time.split(':')[0])) : 'snack');
  const entryKcal = (e) => e.kcal * (e.qty || 1);

  /* ================= State & Persistenz ================= */

  let state = null;
  let chart = null;
  let waterChart = null;
  let chartRange = 'week';
  let histDate = new Date();
  histDate.setHours(12, 0, 0, 0);

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { state = JSON.parse(raw); migrate(); return; }
    } catch (e) {}
    state = seed();
    save();
  }

  // Alt-Daten sanft nachrüsten: qty-/cat-Felder und Wasser-Speicher ergänzen
  function migrate() {
    let dirty = false;
    Object.values(state.days).forEach((entries) => {
      entries.forEach((e) => {
        if (!e.qty) { e.qty = 1; dirty = true; }
        if (!e.cat) { e.cat = catOf(e); dirty = true; }
      });
    });
    if (!state.water) { state.water = {}; dirty = true; }
    if (!state.waterGoal) { state.waterGoal = 2500; dirty = true; }
    // Einmalige Bereinigung: Demo-Vergangenheit aus früheren Versionen entfernen.
    // Löscht alle Tage vor heute – Favoriten und heutige Einträge bleiben erhalten.
    // Das cleaned-Flag stellt sicher, dass ab dann die echte Historie unangetastet wächst.
    if (!state.cleaned) {
      const today = todayKey();
      Object.keys(state.days).forEach((k) => { if (k < today) delete state.days[k]; });
      Object.keys(state.water).forEach((k) => { if (k < today) delete state.water[k]; });
      state.cleaned = true;
      dirty = true;
    }
    if (dirty) save();
  }

  /* ================= Erststart: sauberer Zustand ================= */
  // Keine Demodaten – nur die Standard-Favoriten als Vorlage.
  // Alle getrackten Kalorien, Tage und Wassermengen starten bei Null.

  function seed() {
    return {
      goal: 2500,
      waterGoal: 2500, // ml
      favorites: [
        { id: uid(), name: 'Haferflocken Frühstück', kcal: 450 },
        { id: uid(), name: 'Protein Shake', kcal: 250 },
        { id: uid(), name: 'Hähnchen mit Reis', kcal: 650 },
        { id: uid(), name: 'Magerquark mit Beeren', kcal: 220 },
        { id: uid(), name: 'Vollkornbrot mit Ei', kcal: 380 },
        { id: uid(), name: 'Apfel', kcal: 90 }
      ],
      days: {},
      water: {}, // { 'YYYY-MM-DD': ml }
      cleaned: true // Neuinstallationen brauchen keine Bereinigung
    };
  }

  /* ================= Daten-Zugriff ================= */

  const entriesFor = (key) => state.days[key] || [];
  const totalFor = (key) => entriesFor(key).reduce((sum, e) => sum + entryKcal(e), 0);

  // merge: true → gleicher Name + gleiche Kategorie am selben Tag zählt die Menge hoch
  function addEntry(name, kcal, opts = {}) {
    const key = opts.key || todayKey();
    const now = new Date();
    // Erst Schlüsselwörter im Namen prüfen, nur als Fallback die aktuelle Uhrzeit
    const cat = catForName(name) || catForHour(now.getHours());
    if (opts.merge) {
      const existing = entriesFor(key).find((e) => e.name.toLowerCase() === name.toLowerCase() && catOf(e) === cat);
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
        save();
        return existing;
      }
    }
    if (!state.days[key]) state.days[key] = [];
    const entry = { id: uid(), name, kcal, qty: 1, cat, time: `${pad(now.getHours())}:${pad(now.getMinutes())}` };
    state.days[key].push(entry);
    save();
    return entry;
  }

  // Löschen: bei qty > 1 nur die Menge um 1 reduzieren (z. B. 5 Äpfel -> 4 Äpfel),
  // erst bei qty = 1 den Eintrag komplett entfernen.
  // Rückgabe: 'decremented' | 'removed' | null
  function removeEntry(id, key = todayKey()) {
    if (!state.days[key]) return null;
    const target = state.days[key].find((e) => e.id === id);
    if (!target) return null;
    if ((target.qty || 1) > 1) {
      target.qty -= 1;
      save();
      return 'decremented';
    }
    state.days[key] = state.days[key].filter((e) => e.id !== id);
    if (state.days[key].length === 0) delete state.days[key];
    save();
    return 'removed';
  }

  /* ---------- Wasser (tagesgenau, in ml) ---------- */
  const waterFor = (key) => (state.water && state.water[key]) || 0;

  function addWater(ml, key = todayKey()) {
    const next = Math.max(0, waterFor(key) + ml);
    if (next === 0) delete state.water[key];
    else state.water[key] = next;
    save();
  }

  /* ================= Rendering: gruppierte Mahlzeiten-Liste ================= */

  function mealHTML(e) {
    const qty = e.qty || 1;
    return `
      <div class="meal">
        <span class="m-dot"></span>
        <span class="m-info">
          <span class="m-name">${esc(e.name)}${qty > 1 ? ` <span class="m-qty">(${qty}&times;)</span>` : ''}</span>
          <div class="m-time">${e.time || ''}</div>
        </span>
        <span class="m-kcal">${fmt.format(entryKcal(e))} kcal</span>
        <button class="icon-btn danger" data-del="${e.id}" aria-label="Eintrag löschen">&#10005;</button>
      </div>`;
  }

  function groupedListHTML(entries, emptyText) {
    if (entries.length === 0) return `<li class="empty">${emptyText}</li>`;
    return CATS.map((c) => {
      const items = entries.filter((e) => catOf(e) === c.id);
      if (items.length === 0) return '';
      const sub = items.reduce((s, e) => s + entryKcal(e), 0);
      return `
        <li class="cat-block">
          <div class="cat-head"><span>${c.label}</span><span class="cat-sum">${fmt.format(sub)} kcal</span></div>
          ${items.map(mealHTML).join('')}
        </li>`;
    }).join('');
  }

  /* ================= Rendering: Dashboard ================= */

  const fmtL = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  const liters = (ml) => fmtL.format(ml / 1000);

  function renderWater() {
    const ml = waterFor(todayKey());
    $('#water-now').textContent = liters(ml);
    $('#water-goal-label').innerHTML = `/ ${liters(state.waterGoal)} Liter <span class="edit-hint">&#9998;</span>`;
    $('#water-fill').style.width = Math.min(100, (ml / state.waterGoal) * 100) + '%';
  }

  function renderDashboard() {
    renderWater();
    const total = totalFor(todayKey());
    const goal = state.goal;
    const pct = Math.min(100, (total / goal) * 100);
    const over = total > goal;

    $('#kcal-now').textContent = fmt.format(total);
    $('#goal-label').innerHTML = `/ ${fmt.format(goal)} kcal <span class="edit-hint">&#9998;</span>`;

    const rem = goal - total;
    $('#remaining').innerHTML = over
      ? `<b class="over">${fmt.format(-rem)} kcal über dem Ziel</b>`
      : `Noch <b>${fmt.format(rem)} kcal</b> übrig`;

    const fill = $('#progress-fill');
    fill.style.width = pct + '%';
    fill.classList.toggle('over', over);

    // Heutige Liste – nach Tageszeit gruppiert
    $('#today-list').innerHTML = groupedListHTML(entriesFor(todayKey()), 'Noch nichts eingetragen – guten Appetit!');
    $('#today-sum').textContent = `${fmt.format(total)} kcal`;
  }

  function renderFavorites() {
    // Kein <button> im <button>: Karte ist ein div, Löschen-X ist der einzige echte Button
    $('#fav-grid').innerHTML = state.favorites.length === 0
      ? '<div class="empty" style="grid-column: 1 / -1;">Keine Favoriten – speichere eine Mahlzeit mit dem &#9734;-Button.</div>'
      : state.favorites.map((f) => `
      <div class="fav" data-fav="${f.id}" role="button" tabindex="0">
        <button class="f-del" data-favdel="${f.id}" aria-label="Favorit entfernen">&#10005;</button>
        <span class="f-name">${esc(f.name)}</span>
        <span class="f-kcal">${fmt.format(f.kcal)} kcal</span>
      </div>`).join('');
  }

  /* ================= Rendering: Historie ================= */

  function renderHistory() {
    const key = dateKey(histDate);
    const isToday = key === todayKey();

    $('#hist-weekday').textContent = isToday ? 'Heute' : WEEKDAYS[histDate.getDay()];
    $('#hist-datestr').textContent = `${histDate.getDate()}. ${MONTHS[histDate.getMonth()]} ${histDate.getFullYear()}`;
    $('#hist-picker').value = key;
    $('#hist-picker').max = todayKey();
    $('#hist-next').disabled = isToday;

    $('#hist-list').innerHTML = groupedListHTML(entriesFor(key), 'Für diesen Tag gibt es keine Einträge.');
    $('#hist-sum').textContent = `${fmt.format(totalFor(key))} kcal`;
  }

  /* ================= Rendering: Charts ================= */

  // Jeder Wert wird garantiert als echte Zahl geliefert – nie undefined/null/NaN
  const asNumber = (v) => (Number.isFinite(Number(v)) ? Number(v) : 0);

  // Aktuelle Kalenderwoche: Montag bis Sonntag (12:00 Uhr, DST-sicher)
  function currentWeekDates() {
    const now = new Date();
    const monday = noonDate(now.getFullYear(), now.getMonth(), now.getDate() - ((now.getDay() + 6) % 7));
    const arr = [];
    for (let i = 0; i < 7; i++) arr.push(noonDate(monday.getFullYear(), monday.getMonth(), monday.getDate() + i));
    return arr;
  }

  // Aktueller Kalendermonat: 1. bis letzter Tag
  function currentMonthDates() {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    const dim = new Date(y, m + 1, 0).getDate();
    const arr = [];
    for (let d = 1; d <= dim; d++) arr.push(noonDate(y, m, d));
    return arr;
  }

  // ISO-Kalenderwochen-Nummer (Mo als Wochenstart)
  function isoWeek(d) {
    const date = noonDate(d.getFullYear(), d.getMonth(), d.getDate());
    date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
    const week1 = new Date(date.getFullYear(), 0, 4);
    return 1 + Math.round(((date - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
  }

  // valueFn: Tages-Wert für einen dateKey (kcal oder Liter);
  // Tage ohne localStorage-Eintrag (auch zukünftige) werden explizit als 0 befüllt
  function seriesFor(dates, valueFn, labelFn) {
    const labels = [], values = [];
    dates.forEach((d) => { labels.push(labelFn(d)); values.push(asNumber(valueFn(dateKey(d)))); });
    return { labels, values };
  }

  function yearSeries(valueFn, round) {
    const now = new Date();
    const y = now.getFullYear();
    const labels = [], values = [];
    for (let m = 0; m < 12; m++) {
      labels.push(MONTHS_SHORT[m]);
      if (m > now.getMonth()) { values.push(0); continue; } // Zukunftsmonate: echte 0 statt null
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      let sum = 0, cnt = 0;
      for (let day = 1; day <= daysInMonth; day++) {
        const v = asNumber(valueFn(dateKey(noonDate(y, m, day))));
        if (v > 0) { sum += v; cnt++; }
      }
      values.push(cnt ? asNumber(round(sum / cnt)) : 0);
    }
    return { labels, values };
  }

  const weekLabel = (d) => `${WEEKDAYS_SHORT[d.getDay()]} ${d.getDate()}.`;
  const dayLabel = (d) => `${d.getDate()}.`;

  function kcalData() {
    const now = new Date();
    if (chartRange === 'week') return { ...seriesFor(currentWeekDates(), totalFor, weekLabel), caption: `Kalorien pro Tag – KW ${isoWeek(now)}` };
    if (chartRange === 'month') return { ...seriesFor(currentMonthDates(), totalFor, dayLabel), caption: `Kalorien pro Tag – ${MONTHS[now.getMonth()]} ${now.getFullYear()}` };
    return { ...yearSeries(totalFor, Math.round), caption: `Monatsdurchschnitt – ${now.getFullYear()}` };
  }

  function waterData() {
    const inLiters = (key) => waterFor(key) / 1000;
    const now = new Date();
    if (chartRange === 'week') return { ...seriesFor(currentWeekDates(), inLiters, weekLabel), caption: `Liter pro Tag – KW ${isoWeek(now)}` };
    if (chartRange === 'month') return { ...seriesFor(currentMonthDates(), inLiters, dayLabel), caption: `Liter pro Tag – ${MONTHS[now.getMonth()]} ${now.getFullYear()}` };
    return { ...yearSeries(inLiters, (v) => Math.round(v * 100) / 100), caption: `Täglicher Durchschnitt pro Monat – ${now.getFullYear()}` };
  }

  // Referenzlinien: Ziel (grün) + Durchschnitt (Akzentfarbe des Graphen).
  // Werte liegen als Instanz-Eigenschaften ($goalValue, $avgValue, $avgColor) am Chart.
  // WICHTIG: Funktionen dürfen NICHT in chart.options liegen – Chart.js 4 behandelt
  // Funktionen in den Optionen als "scriptable" und ersetzt sie durch ihren Zahlenwert.
  const refLinesPlugin = {
    id: 'refLines',
    afterDatasetsDraw(c) {
      const { ctx, chartArea, scales } = c;
      if (!scales.y || !chartArea) return;

      const drawLine = (value, stroke, fill, dash, label, side) => {
        if (value == null || !(value > 0)) return;
        const yPos = scales.y.getPixelForValue(value);
        if (yPos < chartArea.top || yPos > chartArea.bottom) return;
        ctx.save();
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.setLineDash(dash);
        ctx.beginPath();
        ctx.moveTo(chartArea.left, yPos);
        ctx.lineTo(chartArea.right, yPos);
        ctx.stroke();

        // Label mit dunkler Pille hinterlegen, damit es auch über hohen
        // Balken am Rand (erster/letzter Tag) immer lesbar bleibt
        ctx.setLineDash([]);
        ctx.font = '600 10px -apple-system, sans-serif';
        const textW = ctx.measureText(label).width;
        const x = side === 'right' ? chartArea.right - textW - 6 : chartArea.left + 6;
        // Wenn die Linie zu nah am oberen Rand liegt, Label unter die Linie setzen
        const below = yPos - 17 < chartArea.top;
        const baseline = below ? yPos + 14 : yPos - 6;
        const padX = 4;
        const rx = x - padX, ry = baseline - 11, rw = textW + padX * 2, rh = 14;
        ctx.fillStyle = 'rgba(10, 14, 22, 0.82)';
        if (typeof ctx.roundRect === 'function') {
          ctx.beginPath();
          ctx.roundRect(rx, ry, rw, rh, 5);
          ctx.fill();
        } else {
          ctx.fillRect(rx, ry, rw, rh);
        }
        ctx.fillStyle = fill;
        ctx.fillText(label, x, baseline);
        ctx.restore();
      };

      const goal = typeof c.$goalValue === 'function' ? c.$goalValue() : null;
      drawLine(goal, 'rgba(69, 214, 164, 0.5)', 'rgba(69, 214, 164, 0.8)', [5, 5], 'Ziel', 'right');
      drawLine(c.$avgValue, c.$avgColor || 'rgba(255,255,255,0.4)', c.$avgLabelColor || 'rgba(255,255,255,0.6)', [2, 4], 'Ø', 'left');
    }
  };

  function makeGradient(rgb) {
    return (context) => {
      const { ctx, chartArea } = context.chart;
      if (!chartArea) return `rgba(${rgb}, 0.8)`;
      const g = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
      g.addColorStop(0, `rgba(${rgb}, 0.25)`);
      g.addColorStop(1, `rgba(${rgb}, 0.95)`);
      return g;
    };
  }

  function makeBarChart(canvas, accent, formatValue, goalValue) {
    const instance = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          data: [],
          backgroundColor: makeGradient(accent.rgb),
          hoverBackgroundColor: accent.hover,
          borderRadius: 8,
          borderSkipped: false,
          maxBarThickness: 42
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 700, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(17, 23, 38, 0.95)',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            titleColor: '#eef1f7',
            bodyColor: accent.tooltip,
            padding: 12,
            cornerRadius: 12,
            displayColors: false,
            callbacks: {
              label: (item) => ` ${formatValue(item.raw ?? 0)}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#8b93a7', font: { size: 11 }, autoSkip: true, maxRotation: 0, maxTicksLimit: 12 },
            border: { color: 'rgba(255,255,255,0.08)' }
          },
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#5b6275', font: { size: 10 }, maxTicksLimit: 6 },
            border: { display: false }
          }
        }
      },
      plugins: [refLinesPlugin]
    });
    // Außerhalb der options – hier fasst Chart.js nichts an
    instance.$goalValue = goalValue;
    instance.$avgColor = `rgba(${accent.rgb}, 0.55)`;
    instance.$avgLabelColor = `rgba(${accent.rgb}, 0.85)`;
    return instance;
  }

  function applyChartData(ch, data) {
    ch.data.labels = data.labels;
    // Doppelte Absicherung: vollbesetztes, rein numerisches Array in Label-Länge
    const clean = data.labels.map((_, i) => asNumber(data.values[i]));
    ch.data.datasets[0].data = clean;
    // Durchschnitt über die getrackten Tage der aktuellen Ansicht
    // (0-Tage – z. B. zukünftige – zählen nicht rein, sonst verfälscht das den Schnitt)
    const tracked = clean.filter((v) => v > 0);
    ch.$avgValue = tracked.length ? tracked.reduce((a, b) => a + b, 0) / tracked.length : null;
    // Achse immer bis zur Ziellinie skalieren – so zeigt auch ein Tag ohne
    // Einträge eine saubere, edle Achse mit leeren Balken statt grauer Fläche
    const goal = typeof ch.$goalValue === 'function' ? ch.$goalValue() : 0;
    ch.options.scales.y.suggestedMax = goal * 1.1;
    // Feinjustierung je nach Datendichte (30 schlanke Balken vs. 7/12 breite)
    const dense = data.labels.length > 12;
    ch.data.datasets[0].borderRadius = dense ? 4 : 8;
    ch.options.scales.x.ticks.maxTicksLimit = dense ? 8 : 12;
    ch.options.scales.x.ticks.font.size = dense ? 10 : 11;
    // Falls das Canvas beim Erzeugen noch unsichtbar/0px war (Tab-Wechsel):
    // Größe neu ermitteln, damit der Graph nicht als leere Fläche hängen bleibt
    if (typeof ch.resize === 'function') ch.resize();
    ch.update();
  }

  function renderCharts() {
    if (!chart) {
      chart = makeBarChart($('#chart'),
        { rgb: '230, 183, 160', hover: 'rgba(240, 207, 184, 1)', tooltip: '#e6b7a0' },
        (v) => `${fmt.format(v)} kcal`,
        () => state.goal);
    }
    if (!waterChart) {
      waterChart = makeBarChart($('#water-chart'),
        { rgb: '98, 203, 232', hover: 'rgba(150, 224, 245, 1)', tooltip: '#62cbe8' },
        (v) => `${fmtL.format(v)} l`,
        () => state.waterGoal / 1000);
    }
    const kd = kcalData();
    const wd = waterData();
    $('#chart-caption').textContent = kd.caption;
    $('#water-chart-caption').textContent = wd.caption;
    applyChartData(chart, kd);
    applyChartData(waterChart, wd);
  }

  /* ================= UI-Helfer ================= */

  function esc(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  let toastTimer = null;
  function toast(html) {
    const el = $('#toast');
    el.innerHTML = html;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function refreshAll() {
    renderDashboard();
    renderHistory();
    if ($('#view-stats').classList.contains('active')) renderCharts();
  }

  /* ================= Events ================= */

  function bindEvents() {
    // Manuelles Hinzufügen
    const nameInp = $('#inp-name');
    const kcalInp = $('#inp-kcal');

    const submit = () => {
      const name = nameInp.value.trim();
      const kcal = Math.round(Number(kcalInp.value));
      if (!name) { nameInp.focus(); return; }
      if (!kcal || kcal <= 0) { kcalInp.focus(); return; }
      addEntry(name, kcal);
      nameInp.value = '';
      kcalInp.value = '';
      haptic();
      toast(`<span class="t-accent">+${fmt.format(kcal)} kcal</span>&nbsp; ${esc(name)}`);
      refreshAll();
    };
    $('#btn-add').addEventListener('click', submit);
    kcalInp.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
    nameInp.addEventListener('keydown', (e) => { if (e.key === 'Enter') kcalInp.focus(); });

    // Aktuelle Eingabe als Favorit speichern
    $('#btn-fav-save').addEventListener('click', () => {
      const name = nameInp.value.trim();
      const kcal = Math.round(Number(kcalInp.value));
      if (!name) { nameInp.focus(); return; }
      if (!kcal || kcal <= 0) { kcalInp.focus(); return; }
      const exists = state.favorites.some((f) => f.name.toLowerCase() === name.toLowerCase() && f.kcal === kcal);
      if (exists) { toast('Bereits in den Favoriten'); return; }
      state.favorites.push({ id: uid(), name, kcal });
      save();
      renderFavorites();
      haptic();
      toast(`<span class="t-accent">&#9733;</span>&nbsp; ${esc(name)} als Favorit gespeichert`);
    });

    // Favoriten (Event-Delegation): X löscht, Karte trackt
    $('#fav-grid').addEventListener('click', (e) => {
      const del = e.target.closest('[data-favdel]');
      if (del) {
        state.favorites = state.favorites.filter((f) => f.id !== del.dataset.favdel);
        save();
        renderFavorites();
        haptic(20);
        toast('Favorit entfernt');
        return;
      }
      const card = e.target.closest('[data-fav]');
      if (!card) return;
      const fav = state.favorites.find((f) => f.id === card.dataset.fav);
      if (!fav) return;
      const entry = addEntry(fav.name, fav.kcal, { merge: true });
      haptic();
      const qtyInfo = (entry.qty || 1) > 1 ? ` (${entry.qty}&times;)` : '';
      toast(`<span class="t-accent">+${fmt.format(fav.kcal)} kcal</span>&nbsp; ${esc(fav.name)}${qtyInfo}`);
      refreshAll();
    });

    // Löschen von heutigen Einträgen (bei Mengen > 1 wird nur 1x abgezogen)
    $('#today-list').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-del]');
      if (!btn) return;
      const result = removeEntry(btn.dataset.del);
      if (!result) return;
      haptic(20);
      toast(result === 'decremented' ? '1&times; entfernt' : 'Eintrag gelöscht');
      refreshAll();
    });

    // Löschen von Einträgen in der Historie (z. B. Tippfehler von gestern)
    $('#hist-list').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-del]');
      if (!btn) return;
      const result = removeEntry(btn.dataset.del, dateKey(histDate));
      if (!result) return;
      haptic(20);
      toast(result === 'decremented' ? '1&times; entfernt' : 'Eintrag gelöscht');
      refreshAll(); // aktualisiert Historie, Dashboard und Graphen
    });

    // Wasser: Schnellauswahl (+250 / +500 / −250)
    $('#water-btns').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-water]');
      if (!btn) return;
      const ml = Number(btn.dataset.water);
      if (ml < 0 && waterFor(todayKey()) === 0) return; // nichts abzuziehen
      addWater(ml);
      haptic();
      toast(ml > 0
        ? `<span class="t-accent">+${fmt.format(ml)} ml</span>&nbsp; Wasser`
        : `${fmt.format(ml)} ml Wasser`);
      renderWater();
    });

    // Wasserziel ändern
    $('#water-goal-label').addEventListener('click', () => {
      const val = prompt('Neues Wasserziel in Litern (z. B. 2,5):', fmtL.format(state.waterGoal / 1000));
      if (val === null) return;
      const litersVal = parseFloat(String(val).replace(',', '.'));
      if (litersVal >= 0.5 && litersVal <= 10) {
        state.waterGoal = Math.round(litersVal * 1000);
        save();
        haptic();
        renderWater();
      }
    });

    // Tagesziel ändern
    $('#goal-label').addEventListener('click', () => {
      const val = prompt('Neues Tagesziel (kcal):', state.goal);
      if (val === null) return;
      const goal = Math.round(Number(val));
      if (goal >= 500 && goal <= 10000) {
        state.goal = goal;
        save();
        haptic();
        refreshAll();
      }
    });

    // Historie: Navigation
    $('#hist-prev').addEventListener('click', () => {
      histDate.setDate(histDate.getDate() - 1);
      haptic();
      renderHistory();
    });
    $('#hist-next').addEventListener('click', () => {
      if (dateKey(histDate) === todayKey()) return;
      histDate.setDate(histDate.getDate() + 1);
      haptic();
      renderHistory();
    });
    $('#hist-picker').addEventListener('change', (e) => {
      if (!e.target.value) return;
      const d = keyToDate(e.target.value);
      if (dateKey(d) > todayKey()) return; // String-Vergleich statt Date-Vergleich (zeitzonensicher)
      histDate = d;
      renderHistory();
    });

    // Chart-Umschalter
    $('#chart-seg').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-range]');
      if (!btn || btn.classList.contains('active')) return;
      document.querySelectorAll('#chart-seg button').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      chartRange = btn.dataset.range;
      haptic();
      renderCharts();
    });

    // Bottom-Navigation – flüssiger Wechsel:
    // 1) alte Ansicht ausblenden, 2) unsichtbar nach oben scrollen,
    // 3) im nächsten Frame die neue Ansicht einfaden. So ist der Scroll-Sprung nie sichtbar.
    document.querySelectorAll('.nav-inner button').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('active')) return;
        document.querySelectorAll('.nav-inner button').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        haptic();

        document.querySelectorAll('.view').forEach((v) => v.classList.remove('active'));
        window.scrollTo(0, 0); // sofortiger Scroll, während keine Ansicht sichtbar ist

        requestAnimationFrame(() => {
          if (btn.dataset.view === 'history') renderHistory();
          $('#view-' + btn.dataset.view).classList.add('active');
          if (btn.dataset.view === 'stats') renderCharts();
        });
      });
    });
  }

  /* ================= Init ================= */

  function init() {
    load();

    const now = new Date();
    $('#header-date').textContent = `${WEEKDAYS[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]}`;

    bindEvents();
    renderFavorites();
    renderDashboard();
    renderHistory();
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
